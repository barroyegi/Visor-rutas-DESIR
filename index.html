<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Buscador de senderos</title>
  <link rel="stylesheet" href="./style.css" />
  <link
    href="https://fonts.googleapis.com/css2?family=Poppins:wght@100;200;300;400;500;600;700;800;900&amp;display=swap"
    rel="stylesheet">
</head>

<body>
  <div id="app">
    <header>
      <h1 data-i18n="title">Buscador de senderos</h1>
      <div class="header-right">
        <div class="btn_idena">
          <a
            href="https://idena.navarra.es/navegar/?lang=es#ZXh0fGJhc2V8bWFwYWJhc2V8bGF5ZXJzfHV8Ly9pZGVuYS5uYXZhcnJhLmVzL29nYy93bXN8bnxJREVOQTpzZW5kZXJvc3xvfHZ8aHx1cnxmfHR8SURFTkF8aXxsY2F0LTEtMV4xXjQ5NDczNy4yODV8NDYzOTk4Ni45OTl8NzE4NDgxLjI4NXw0ODAyODAyLjk5OV4kMHxASXxKfEt8TF18MXwyfDN8QCQ0fDV8Nnw3fDh8SHw5fC0xfEF8LTF8QnwtNXxDfC01fER8RXxGfEddXV0=">
            <img id="logo_idena" src="https://www.navarra.es/documents/4288576/5786431/logos_260x130_idena.png/">
          </a>
        </div>
        <div class="lang-switcher">
          <button class="lang-btn active" data-lang="es">ES</button>
          <button class="lang-btn" data-lang="fr">FR</button>
          <button class="lang-btn" data-lang="eus">EUS</button>
        </div>
      </div>
    </header>

    <div class="main-container">
      <aside class="sidebar">
        <div class="sidebar-overlay"></div>
        <div class="sidebar-content">
          <div class="filters">
            <!-- Distance Dropdown -->
            <div class="filter-dropdown">
              <button class="filter-dropdown-btn" id="distance-dropdown-btn">
                <span data-i18n="distance">Distancia</span>
                <span class="dropdown-chevron">▼</span>
              </button>
              <div class="filter-dropdown-content" id="distance-dropdown-content">
                <div class="slider-container">
                  <div class="slider-track" id="slider-track"></div>
                  <input type="range" id="distance-slider-min" min="0" max="100" value="0" step="0.5"
                    class="custom-slider double-slider">
                  <input type="range" id="distance-slider-max" min="0" max="100" value="100" step="0.5"
                    class="custom-slider double-slider">
                  <div class="slider-labels">
                    <span id="slider-min-label">0 km</span>
                    <span id="slider-max-label">+ 100 km</span>
                  </div>
                </div>
                <button class="apply-filter-btn" id="apply-distance-filter" data-i18n="applyFilter">Aplicar
                  filtro</button>
              </div>
            </div>

            <!-- More Filters Dropdown -->
            <div class="filter-dropdown">
              <button class="filter-dropdown-btn" id="more-filters-dropdown-btn">
                <span data-i18n="moreFilters">Más Filtros</span>
                <span class="dropdown-chevron">▼</span>
              </button>
              <div class="filter-dropdown-content" id="more-filters-dropdown-content">
                <label><span data-i18n="difficulty">Dificultad</span>:
                  <select id="difficulty-filter">
                    <option value="All" data-i18n="all">Todas</option>
                    <option value="1">1</option>
                    <option value="2">2</option>
                    <option value="3">3</option>
                    <option value="4">4</option>
                  </select>
                </label>
                <label><span data-i18n="matricula">Matrícula</span>:
                  <select id="matricula-filter">
                    <option value="All" data-i18n="all">Todas</option>
                  </select>
                </label>
                <button class="apply-filter-btn" id="apply-more-filters" data-i18n="applyFilter">Aplicar filtro</button>
              </div>
            </div>
            <button id="reset-filters-btn" class="reset-btn" title="Reiniciar filtros" data-i18n-title="resetFilters">
              <svg viewBox="0 0 24 24" width="18" height="18" stroke="var(--primary-color)" stroke-width="2" fill="none"
                stroke-linecap="round" stroke-linejoin="round">
                <polyline points="23 4 23 10 17 10"></polyline>
                <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"></path>
              </svg>
            </button>
          </div>
          <div class="search-container">
            <input type="text" id="search-input" placeholder="Buscar por nombre..."
              data-i18n-placeholder="searchPlaceholder">
          </div>

          <div class="list-container">
            <h3 data-i18n="routesList">Listado de Rutas</h3>
            <div id="routes-list" data-i18n="loadingRoutes">Cargando rutas...</div>
          </div>
        </div>

        <div class="details-container">
          <div id="route-details" data-i18n="selectRoute">Selecciona una ruta para ver detalles.</div>
        </div>
      </aside>
      <main id="viewDiv"></main>
      <div id="chart-container">
        <canvas id="elevation-chart"></canvas>
      </div>
    </div>

    <!-- Floating Filter Button (Mobile) -->
    <button id="mobile-filter-btn" class="floating-btn" title="Filtros" data-i18n-title="filters">
      <svg viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" stroke-width="2" fill="none"
        stroke-linecap="round" stroke-linejoin="round">
        <polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3"></polygon>
      </svg>
    </button>

    <!-- Mobile Filter Modal -->
    <div id="filter-modal" class="modal">
      <div class="modal-content filter-modal-content">
        <div class="filter-modal-header">
          <h2 data-i18n="filters">Filtros</h2>
          <span class="modal-close" id="close-filter-modal">&times;</span>
        </div>
        <div id="mobile-filters-placeholder">
          <!-- Filters from sidebar will be moved here on mobile -->
        </div>
        <div class="filter-modal-footer">
          <button id="reset-mobile-filters" class="reset-mobile-btn" data-i18n="resetFilters">Restablecer</button>
          <button id="apply-mobile-filters" class="apply-filter-btn" data-i18n="apply_filters">Aplicar Filtros</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Photo Carousel Modal -->
  <div id="photo-modal" class="modal">
    <span class="modal-close">&times;</span>
    <div class="modal-content">
      <button class="modal-prev">&#10094;</button>
      <img id="modal-image" src="" alt="Route Photo">
      <button class="modal-next">&#10095;</button>
    </div>
    <div id="modal-caption"></div>
  </div>

  <script type="module" src="./main.js"></script>
</body>

</html>
